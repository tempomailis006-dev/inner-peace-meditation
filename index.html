<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inner Peace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== PHASE 1: CALM PAGE ===== -->
    <div id="calm-page">
        <!-- Floating particles for ambiance -->
        <div class="particles" id="particles"></div>

        <!-- Banner Section -->
        <section class="banner-section">
            <div class="banner-container">
                <img src="IMG_1624.JPEG" alt="Banner" class="banner-image" id="banner-img">
            </div>
        </section>

        <!-- Audio Player Section -->
        <section class="audio-section">
            <div class="audio-container">
                <div class="audio-glow"></div>
                <div class="mandala" id="mandala">
                    <div class="mandala-ring ring-1"></div>
                    <div class="mandala-ring ring-2"></div>
                    <div class="mandala-ring ring-3"></div>
                    <div class="mandala-core"></div>
                </div>

                <button class="play-button" id="play-btn" aria-label="Play audio">
                    <div class="play-button-ring"></div>
                    <svg class="play-icon" id="play-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg class="pause-icon hidden" id="pause-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>

                <!-- Progress bar -->
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <div class="progress-time">
                        <span id="current-time">0:00</span>
                        <span id="total-time">0:00</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Hidden Audio -->
        <audio id="meditation-audio" preload="auto">
            <source src="WhatsApp Video 2026-07-12 at 2.03.50 PM.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- ===== PHASE 2: JUMP SCARE VIDEO (HIDDEN) ===== -->
    <div id="jumpscare-overlay" class="jumpscare-overlay hidden">
        <video id="jumpscare-video" preload="auto" playsinline>
            <source src="vidssave.mp4" type="video/mp4">
        </video>
    </div>

    <!-- ===== PHASE 3: CREEPY TEXT (HIDDEN) ===== -->
    <div id="creepy-phase" class="creepy-phase hidden">
        <div class="creepy-bg"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
